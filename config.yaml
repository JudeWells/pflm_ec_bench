data:
  swissprot_query: "(reviewed:true) AND (ec:*)"
  output_dir: "data"

families:
  min_family_size: 10
  max_family_size: 99999999999
  max_promiscuous_fraction: 0.2

conditioning:
  max_size: 100
  cluster_identity: 0.7

candidates:
  max_pairs_per_instance: 500
  min_pairs_per_instance: 2
  sim_bins: [20, 30, 40, 50, 60, 70, 80, 90, 100]
  max_per_bin: 50
  # When true, each positive is paired with the closest decoy whose max identity
  # to the conditioning set is *strictly greater* than the positive's, instead of
  # the absolute-closest in the same bin. This removes the residual bias where
  # positives are slightly more similar than their matched negatives, ensuring a
  # pure-homology baseline scores at or below chance. max_pair_gap caps the
  # negative-minus-positive identity gap (percentage points) to keep pairs close.
  negative_higher: true
  max_pair_gap: 5.0

false_negative_protection:
  exclude_pident_threshold: 0.7
  exclude_promiscuous: true
  family_overlap_pident: 0.9

mmseqs:
  sensitivity: 7.5
  max_seqs: 1000
  cluster_identity_for_cross_ec3: 0.5
  threads: 8
